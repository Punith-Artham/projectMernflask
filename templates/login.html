<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clotify Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>
    <div class="clotify-login-page">
        <div class="clotify-brand">
            <div class="clotify-logo">C</div>
            <h1>Clotify</h1>
            <p>AI Virtual Fitting Platform</p>
        </div>

        <form class="clotify-login-card" method="post" id="loginForm" novalidate>
            <h2>Welcome Back</h2>
            <p>Sign in to continue your virtual fitting experience</p>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}
            <div id="clientError" class="auth-error" style="display:none;"></div>

            <div class="form-component">
                <label for="email">Email</label>
                <input type="text" name="email" id="email" value="{{ email or '' }}" placeholder="you@example.com" required>
            </div>
            <div class="form-component">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="clotify-login-btn">Log In</button>
            <p class="clotify-register-link">Don't have an account? <a href="/register">Register Here</a></p>
        </form>
    </div>

</body>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('clientError');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        errorBox.style.display = 'none';
        errorBox.textContent = '';

        if (!email || !password) {
            e.preventDefault();
            errorBox.textContent = 'Email and password are required.';
            errorBox.style.display = 'block';
            return;
        }

        if (!emailRegex.test(email)) {
            e.preventDefault();
            errorBox.textContent = 'Please enter a valid email address.';
            errorBox.style.display = 'block';
        }
    });
</script>
</html>
